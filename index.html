<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milas TV Online</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
        }
        h1 { 
            color: #00ff66;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .video-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
            border: 2px solid #00ff66;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .section-title {
            text-align: left;
            max-width: 500px;
            margin: 20px auto 10px auto;
            color: #00ff66;
            font-size: 15px;
            font-weight: bold;
        }
        .channel-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .btn {
            background-color: #252525;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 8px;
            font-weight: bold;
        }
        /* Rangi Maalum ya Azam (Bluu/Chungwa hivi) tukiitofautisha kidogo */
        .btn-azam {
            border: 1px solid #0078ff;
            color: #0078ff;
        }
        .btn:active { 
            background-color: #00ff66;
            border-color: #00ff66;
            color: black;
        }
        
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #0078ff;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0px 4px 10px rgba(0, 120, 255, 0.4);
            text-decoration: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>Milas TV Station</h1>
    <div class="subtitle">Chagua Channel ya Kuangalia Live</div>

    <!-- Video Player -->
    <div class="video-container">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <!-- SEHEMU YA LIGI YA NYUMBANI & AZAM -->
    <div class="section-title">🇹🇿 NYUMBANI (AZAM)</div>
    <div class="channel-list">
        <!-- Hapa tumeweka Button ya Azam Two ya Majaribio -->
        <button class="btn btn-azam" onclick="playAzam('https://trtworld.daastreaming.net/news/live_low/index.m3u8')">📺 Azam Two Live</button>
        <button class="btn" onclick="alert('Azam Sports bado inafanyiwa matengenezo ya ulinzi (DRM).')">⚽ Azam Sports</button>
    </div>

    <!-- SEHEMU YA MICHEZO YA KIMATAIFA -->
    <div class="section-title">⚽ MICHEZO KIMATAIFA</div>
    <div class="channel-list">
        <button class="btn" onclick="playChannel('https://rbmn-live.akamaized.net/hls/live/590964/global/master.m3u8')">⚽ Red Bull TV</button>
        <button class="btn" onclick="playChannel('https://edge-edgesport-fast.samsung.wurl.tv/playlist.m3u8')">⚽ Edge Sport</button>
    </div>

    <!-- KITUFE CHA WHATSAPP -->
    <a href="https://wa.me/255671932983?text=Habari%20Milas,%20naomba%20link%20mpya%20ya%20Azam%20Two..." class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function playChannel(url) {
            var video = document.getElementById('video');
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() { video.play(); });
            }
        }

        // Kazi maalum ya kushughulikia Azam Two
        function playAzam(fallbackUrl) {
            alert("Mkuu Milas, Azam Two inatumia ulinzi wa DRM. Tunaiwasha kwa kutumia Mfumo wa Dharura (Server Backup)!");
            playChannel(fallbackUrl);
        }

        window.onload = function() play channel {'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8
');
        };
    </script>

</body>
</html>
